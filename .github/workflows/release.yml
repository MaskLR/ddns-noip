name: Go Build and Release

on:
  push:
    branches:
      - main  # 只有推送到 main 分支时才会触发工作流

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Checkout 代码
    - name: Checkout repository
      uses: actions/checkout@v2

    # 设置 Go 环境
    - name: Set up Go
      uses: actions/setup-go@v3
      with:
        go-version: '1.24.4'  # 可以修改为你使用的 Go 版本

    # 获取依赖
    - name: Install dependencies
      run: |
        cd bin/ddns-client
        go mod tidy
        go mod download
        cd ..

    # 编译 ARM 32 位 Go 二进制文件
    - name: Build ARM 32-bit Go binary
      run: |
       cd bin/ddns-client
       GOARCH=arm GOOS=linux go build -o ../bin/ddns-client
       cd ..

    # 删除 Go 代码文件（保留二进制文件）
    - name: Clean up Go source files
      run: |
        rm -rf bin/ddns-client
        


    # 将文件保存到工作流的 artifacts 目录
    - name: Save artifacts
      uses: actions/upload-artifact@v4  # 使用 v4 版本
      with:
        name: ddns-client-artifacts
        path: ./